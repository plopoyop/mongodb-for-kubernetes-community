---
suite: Require admin password change
templates:
  - secrets.yaml
tests:
  - it: should fail when adminPassword is the default placeholder
    set:
      adminPassword: "change-me"
    asserts:
      - failedTemplate:
          errorMessage: 'adminPassword must be changed from its default value "change-me". Set a strong adminPassword (e.g. --set adminPassword=<strong-password> or in your values file) before installing.'

  - it: should fail when adminPassword is empty
    set:
      adminPassword: ""
    asserts:
      - failedTemplate:
          errorMessage: 'adminPassword must be changed from its default value "change-me". Set a strong adminPassword (e.g. --set adminPassword=<strong-password> or in your values file) before installing.'

  - it: should render the admin password secret when a real value is set
    documentIndex: 0
    set:
      adminPassword: "s3cure-pass"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-mongodb-instance-mongo-admin-password"
      - equal:
          path: stringData.password
          value: "s3cure-pass"
