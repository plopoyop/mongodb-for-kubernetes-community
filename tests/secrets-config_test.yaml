---
suite: Secrets configuration
templates:
  - secrets.yaml
set:
  adminPassword: "s3cure-pass"
tests:
  - it: should create secret for db user
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-mongodb-instance-mongo-admin-password"
      - equal:
          path: stringData.password
          value: "s3cure-pass"

  - it: should create secret for metrics if enabled
    documentIndex: 1
    set:
      metrics:
        enabled: true
        passwordSecretRef: "passSecretRef"
        password: "pass"
    asserts:
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-mongodb-instance-passSecretRef"
      - equal:
          path: stringData.password
          value: "pass"
